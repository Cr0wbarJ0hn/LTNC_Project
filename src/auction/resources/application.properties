# ✅ Spring Boot Configuration - application.properties

# ===== APPLICATION INFO =====
spring.application.name=LTNC-Auction-System
spring.application.version=1.0.0

# ===== MYSQL DATABASE CONFIGURATION =====
spring.datasource.url=jdbc:mysql://localhost:3306/ltnc_auction?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== CONNECTION POOL (HikariCP) =====
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===== JPA/HIBERNATE CONFIGURATION =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-auction.view=false

# ===== HIBERNATE PROPERTIES =====
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===== FLYWAY CONFIGURATION (Database Migrations) =====
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true

# ===== SERVER CONFIGURATION =====
server.port=8080
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# ===== MVC CONFIGURATION =====
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.auction.resources.add-mappings=false

# ===== JACKSON CONFIGURATION (JSON) =====
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# ===== LOGGING CONFIGURATION =====
logging.level.root=INFO
logging.level.com.ltnc=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

logging.file.name=logs/ltnc-auction.log
logging.file.max-size=10MB
logging.file.max-history=30

# ===== CUSTOM AUCTION SYSTEM CONFIGURATION =====
auction.system.name=LTNC Auction System
auction.system.version=1.0.0
auction.auto-bid.max-extensions=3
auction.auto-bid.thread-pool-size=10
auction.anti-sniping.window-seconds=60
auction.anti-sniping.extension-seconds=300
auction.anti-sniping.max-extensions=3
auction.auction.websocket.enabled=true
auction.auction.websocket.max-connections=1000